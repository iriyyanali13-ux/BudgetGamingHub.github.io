<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Builds & Pricing | Gaming Budget Hub</title>
    <style>
        html { scroll-behavior: smooth; }
        :root { --primary-neon: #00ffcc; --bg-deep: #0b0e14; --card-bg: #161b22; --highlight: #ffdb4d; }
        body.light-mode { --bg-deep: #f4f4f9; --card-bg: #ffffff; color: #333; }
        
        /* Light Mode Navigation Fix */
        body.light-mode .nav a { color: #1c1e21 !important; }
        body.light-mode .nav a:hover, body.light-mode .nav a.active { color: #008f72 !important; }
        body.light-mode .menu-toggle { color: #1c1e21 !important; }

        /* Light Mode Footer Fix */
        body.light-mode footer { background: #ffffff !important; border-top: 1px solid #ddd !important; }
        body.light-mode footer p, body.light-mode footer a { color: #1c1e21 !important; }
        body.light-mode footer p[style*="var(--primary-neon)"] { color: #008f72 !important; }

        body { background-color: var(--bg-deep); color: #e6edf3; font-family: 'Segoe UI', sans-serif; margin: 0; transition: 0.3s; }
        .header { background: rgba(13, 17, 23, 0.95); border-bottom: 2px solid var(--primary-neon); display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; position: sticky; top: 0; z-index: 2000; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-neon); text-transform: uppercase; }
        .nav { display: flex; align-items: center; }
        .nav a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: 500; transition: 0.3s; }
        .nav a:hover { color: var(--primary-neon); }
        .nav a.active { color: var(--primary-neon); border-bottom: 2px solid var(--primary-neon); padding-bottom: 5px; }
        .menu-toggle { display: none; font-size: 2rem; color: var(--primary-neon); cursor: pointer; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-deep); border-bottom: 2px solid var(--primary-neon); padding: 20px 0; }
            .nav.active { display: flex !important; }
        }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .card { background: var(--card-bg); border: 1px solid #30363d; border-radius: 12px; padding: 25px; margin-bottom: 35px; transition: 0.3s; }
        .price-list { list-style: none; padding: 0; margin: 15px 0; border-left: 2px solid #30363d; padding-left: 20px; }
        .part-cost { color: var(--highlight); font-weight: bold; font-family: monospace; }
        .total-row { border-top: 1px solid #30363d; margin-top: 10px; padding-top: 10px; font-weight: bold; color: var(--primary-neon); font-size: 1.2rem; }
        .theme-btn { background: none; border: 1px solid var(--primary-neon); color: var(--primary-neon); cursor: pointer; padding: 5px 12px; border-radius: 5px; }
    </style>
</head>
<body>
<header class="header">
    <div class="logo">Gaming Budget Hub</div>
    <div class="menu-toggle" id="mobile-menu">☰</div>
    <nav class="nav" id="nav-menu">
        <a href="index.html">Home</a>
        <a href="builds.html" class="active">PC Builds</a>
        <a href="fps-guides.html">FPS Guides</a>
        <a href="fps-counter.html">FPS Counter</a>
        <a href="contact.html">Contact Us</a>
    </nav>
    <button id="theme-toggle" class="theme-btn">🌙</button>
</header>

<main class="container">
    <div class="card">
        <h3 style="color: var(--primary-neon);">The Entry Level King - 40k</h3>
        <ul class="price-list">
            <li><span>CPU: Ryzen 5 2600</span> <span class="part-cost">PKR 13,000</span></li>
            <li><span>GPU: RX 580 8GB</span> <span class="part-cost">PKR 19,000</span></li>
            <li class="total-row"><span>Approx Total:</span> <span>PKR 42,000</span></li>
        </ul>
    </div>
</main>

<footer style="background: #0d1117; border-top: 1px solid #30363d; padding: 40px 20px; text-align: center; margin-top: 50px;">
    <p style="color: var(--primary-neon); font-weight: 600;">GAMING BUDGET HUB</p>
    <p style="color: #8b949e; font-size: 0.9rem;">Your guide to budget gaming in Pakistan.</p>
</footer>
<script src="main.js"></script>
</body>
</html>
